# 律师智能体 Docker Compose 配置

version: '3.8'

services:
  # 律师智能体应用
  law-agent:
    build: .
    container_name: law-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - RAG_API_ENDPOINT=${RAG_API_ENDPOINT}
      - RAG_API_KEY=${RAG_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - MINIMAX_API_ENDPOINT=${MINIMAX_API_ENDPOINT}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_MODEL=${MINIMAX_MODEL}
      - MINIMAX_FALLBACK_MODELS=${MINIMAX_FALLBACK_MODELS}
      - AUDIT_DB_PATH=${AUDIT_DB_PATH}
      - TASK_DB_PATH=${TASK_DB_PATH}
      - CLIENT_PROFILE_DB_PATH=${CLIENT_PROFILE_DB_PATH}
      - ORCHESTRATION_DB_PATH=${ORCHESTRATION_DB_PATH}
      - ENABLE_EXTERNAL_SEARCH=${ENABLE_EXTERNAL_SEARCH}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - TAVILY_PROJECT_ID=${TAVILY_PROJECT_ID}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - law-agent-network

  # Prometheus 监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - law-agent-network

  # Grafana 可视化（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - law-agent-network

networks:
  law-agent-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
